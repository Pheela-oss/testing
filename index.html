<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Carregando...</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            margin: 0;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        // Aguarda 3 segundos para mostrar a animação e redireciona
        setTimeout(function() {
            if (window.innerWidth <= 768) {
                window.location.href = "MobileVersion.html"; // Nome do seu arquivo mobile
            } else {
                window.location.href = "PcVersion.html"; // Nome do seu arquivo PC
            }
        }, 3000);
    </script>
</head>
<body>
    <div class="loader"></div>
    <p>Detectando seu dispositivo...</p>
    <p style="font-size: 12px; color: gray;">Você está sendo redirecionado para a melhor versão.</p>
</body>
</html>
